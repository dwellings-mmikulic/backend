services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dwellings
      POSTGRES_PASSWORD: dwellings
      POSTGRES_DB: dwellings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwellings -d dwellings"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://dwellings:dwellings@db:5432/dwellings?sslmode=disable
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
