# Dwellings backend reverse proxy. Installed at
# /etc/nginx/sites-available/dwellings and symlinked into sites-enabled.
#
# Canonical backend host: https://api.dwellings.tv
# Apex (dwellings.tv) and www (www.dwellings.tv) 301-redirect to it.
# TLS certs are issued/renewed by certbot (cert name "dwellings.tv");
# the SANs must cover every server_name used in a 443 block below.

# --- Backend API (canonical) ---------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.dwellings.tv;
    return 301 https://api.dwellings.tv$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name api.dwellings.tv;

    ssl_certificate /etc/letsencrypt/live/dwellings.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dwellings.tv/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Roku Direct Publisher feed + health check + everything else → app container.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# --- Apex + www → redirect to canonical api host -------------------------
server {
    listen 80;
    listen [::]:80;
    server_name dwellings.tv www.dwellings.tv;
    return 301 https://api.dwellings.tv$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dwellings.tv www.dwellings.tv;

    ssl_certificate /etc/letsencrypt/live/dwellings.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dwellings.tv/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://api.dwellings.tv$request_uri;
}
